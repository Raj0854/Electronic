<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">


</head>


<body>
    <header>
        <div class="bg_picture">
            <div class="header">
                <div class="navbar container">
                    <div class="logo">
                        <i class="fa-solid fa-microchip"></i>
                        E-Tech
                    </div>

                    <ul class="nav-links">
                        <li><a href="#home">Home</a></li>
                        <li><a href="#products">Products</a></li>
                        <li><a href="#categories">Categories</a></li>
                        <li><a href="#reviews">Reviews</a></li>
                    </ul>

                    <div class="nav-actions">

                        <button id="theme-toggle" class="theme-btn">
                            <i class="fa-solid fa-moon"></i>
                        </button>

                        <button id="cart-btn" class="cart-btn">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span id="cart-count">0</span>
                        </button>

                    </div>
                </div>
            </div>
            <div class="slogon container">
                <div class="hero1">
                    <span class="hero-tag">
                        Future Technology, Today.
                    </span>
                </div>
            </div>
            <div class="middle_section container
        ">
                <div class="hero-content">
                    <h1>Future of Technology</h1>
                    <p>
                        Discover flagship smartphones, laptops,
                        gaming accessories, headphones and smart
                        devices designed for performance.
                    </p>

                    <div class="hero-buttons">
                        <a href="#products" class="primary-btn">
                            Shop Collection
                        </a>

                        <a href="#categories" class="secondary-btn">
                            Explore More
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="hero">
            9
        </div>
    </main>
</body>

</html>
